version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    groups:
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      tooling:
        patterns:
          - "typescript"
          - "eslint*"
          - "@types/*"
          - "@playwright/test"
          - "tailwindcss"
          - "@tailwindcss/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "Asia/Kolkata"
