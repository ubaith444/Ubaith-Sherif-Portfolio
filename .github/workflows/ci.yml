name: Release CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Start production server
        run: |
          npm run start -- -p 3002 > /tmp/next.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3002 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/next.log
          exit 1

      - name: Smoke test production build
        run: npm run test:smoke
        env:
          SMOKE_BASE_URL: http://127.0.0.1:3002

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  vercel-preview:
    name: Vercel Preview
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request' && vars.ENABLE_VERCEL_GITHUB_ACTIONS == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}

  vercel-production:
    name: Vercel Production
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.ENABLE_VERCEL_GITHUB_ACTIONS == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
