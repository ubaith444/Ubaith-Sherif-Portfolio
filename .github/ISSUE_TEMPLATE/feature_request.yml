name: Feature request
description: Suggest a focused improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the requested change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Content
        - UI
        - SEO/GEO/AEO
        - Accessibility
        - Performance
        - CI/CD
        - Documentation
